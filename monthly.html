<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행복한 하루 — 16일 예보</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --card: rgba(255,255,255,.88); --radius: 18px; }

  body.clear        { --A:#fef3c7; --B:#fed7aa; --P:#d97706; --T:#78350f; }
  body.partlyCloudy { --A:#dbeafe; --B:#e0f2fe; --P:#0284c7; --T:#0c4a6e; }
  body.cloudy       { --A:#e2e8f0; --B:#cbd5e1; --P:#475569; --T:#1e293b; }
  body.foggy        { --A:#d1fae5; --B:#ecfdf5; --P:#059669; --T:#064e3b; }
  body.drizzle      { --A:#dbeafe; --B:#c7d2fe; --P:#4f46e5; --T:#1e3a8a; }
  body.rainy        { --A:#c7d2fe; --B:#a5b4fc; --P:#4338ca; --T:#312e81; }
  body.snowy        { --A:#e0f2fe; --B:#f0f9ff; --P:#0369a1; --T:#0c4a6e; }
  body.thunderstorm { --A:#1e1b4b; --B:#312e81; --P:#a5b4fc; --T:#e0e7ff; --card:rgba(15,10,60,.75); }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, var(--A,#fef3c7) 0%, var(--B,#fed7aa) 100%);
    color: var(--T, #78350f);
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    transition: background 1.4s ease, color .6s;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  .site-header { text-align: center; padding: 2rem 1rem 1rem; }
  .site-logo   { font-size: 1.9rem; font-weight: 900; color: var(--P); margin-bottom: .15rem; }
  .site-sub    { font-size: .83rem; opacity: .65; margin-bottom: .7rem; }
  .date-box    {
    display: inline-flex; flex-direction: column; align-items: center;
    background: var(--card); backdrop-filter: blur(10px);
    border-radius: 14px; padding: .5rem 1.3rem;
    box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-bottom: .6rem;
  }
  .date-box .today-label { font-size: .75rem; opacity: .55; }
  .date-box .today-date  { font-size: .95rem; font-weight: 700; color: var(--P); }

  .nav-links { display: flex; justify-content: center; gap: .5rem; flex-wrap: wrap; }
  .nav-link  {
    display: inline-block; padding: .32rem .8rem;
    background: var(--card); border-radius: 999px;
    color: var(--P); text-decoration: none; font-size: .82rem; font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: opacity .2s;
  }
  .nav-link:hover { opacity: .8; }

  /* ── LOCATION BAR ── */
  .loc-bar { display: flex; justify-content: center; gap: .5rem; padding: .5rem 1rem; flex-wrap: wrap; }
  .loc-bar input {
    padding: .45rem .9rem; border: 1.5px solid var(--P);
    border-radius: 8px; font-size: .88rem; background: var(--card); color: var(--T); width: 175px;
  }
  .loc-btn {
    padding: .45rem .9rem; background: var(--P); color: #fff;
    border: none; border-radius: 8px; cursor: pointer; font-size: .88rem;
    font-weight: 600; transition: opacity .2s;
  }
  .loc-btn:hover { opacity: .85; }

  /* ── MAIN ── */
  main { max-width: 740px; margin: 0 auto; padding: .5rem 1rem 4rem; }
  #loading { text-align: center; padding: 2.5rem; font-size: 1rem; color: var(--P); }
  #err-box { text-align: center; padding: 1.5rem; }
  .err-btn { margin-top: .6rem; padding: .4rem .9rem; background: #e11d48; color: #fff; border: none; border-radius: 6px; cursor: pointer; }

  /* ── FORECAST GRID ── */
  .forecast-section { margin-bottom: 1.2rem; }
  .section-title {
    font-size: .75rem; font-weight: 700; opacity: .45;
    text-transform: uppercase; letter-spacing: .07em; margin-bottom: .5rem;
  }
  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: .4rem;
  }
  @media (max-width: 620px) { .forecast-grid { grid-template-columns: repeat(4, 1fr); } }

  .day-card {
    background: var(--card);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: .55rem .3rem;
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all .18s;
    min-width: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .day-card:hover  { border-color: var(--P); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.12); }
  .day-card.sel    { background: var(--P); color: #fff; border-color: var(--P); }
  .day-card.today-card .day-wd { color: var(--P); font-weight: 800; }
  .day-card.sel    .day-wd     { color: rgba(255,255,255,.75); }

  .day-wd   { font-size: .6rem; opacity: .7; }
  .day-dt   { font-size: .7rem; font-weight: 700; margin-bottom: .1rem; }
  .day-ico  { font-size: 1.4rem; display: block; margin: .1rem 0; }
  .day-tmax { font-size: .72rem; font-weight: 700; }
  .day-tmin { font-size: .64rem; opacity: .6; }
  .day-rain { font-size: .58rem; opacity: .55; margin-top: .05rem; }

  /* ── SELECTED DAY BANNER ── */
  .sel-banner {
    background: var(--card); backdrop-filter: blur(12px);
    border-radius: var(--radius); padding: 1.2rem 1.5rem;
    margin-bottom: 1rem; box-shadow: 0 4px 24px rgba(0,0,0,.1);
    display: flex; align-items: center; gap: 1.2rem;
  }
  .sel-big  { font-size: 3.5rem; flex-shrink: 0; }
  .sel-date { font-size: .82rem; opacity: .6; margin-bottom: .1rem; }
  .sel-temp { font-size: 1.7rem; font-weight: 800; }
  .sel-cond { font-size: .9rem; font-weight: 600; }
  .sel-meta { display: flex; gap: .8rem; font-size: .78rem; margin-top: .3rem; opacity: .6; flex-wrap: wrap; }

  /* ── QUOTE ── */
  .quote-box {
    background: var(--P); color: #fff; border-radius: var(--radius);
    padding: 1rem 1.3rem; margin-bottom: 1rem;
    font-size: .95rem; font-style: italic; font-weight: 500;
    box-shadow: 0 4px 18px rgba(0,0,0,.12); position: relative; overflow: hidden;
  }
  .quote-box::before { content: '\201C'; font-size: 5rem; position: absolute; top: -1.2rem; left: .3rem; opacity: .2; font-family: Georgia,serif; }
  .quote-box .q-text { position: relative; }
  .quote-box .q-src  { display: block; font-style: normal; font-size: .78rem; opacity: .75; margin-top: .3rem; }

  /* ── TABS ── */
  .tab-bar { display: flex; gap: .4rem; overflow-x: auto; padding-bottom: .3rem; margin-bottom: 1rem; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0; padding: .5rem 1rem;
    border: 1.5px solid var(--P); border-radius: 999px;
    background: transparent; color: var(--P);
    font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .tab-btn.active, .tab-btn:hover { background: var(--P); color: #fff; }

  .panel { display: none; }
  .panel.active { display: block; }
  .content-card { background: var(--card); backdrop-filter: blur(10px); border-radius: var(--radius); padding: 1.3rem; box-shadow: 0 3px 18px rgba(0,0,0,.08); }

  /* Music */
  .music-artist { font-size: .78rem; opacity: .6; margin-bottom: .2rem; }
  .music-title  { font-size: 1rem; font-weight: 700; margin-bottom: .3rem; }
  .music-why    { font-size: .85rem; opacity: .7; margin-bottom: .8rem; padding: .5rem; background: rgba(0,0,0,.04); border-radius: 8px; border-left: 3px solid var(--P); }
  /* YouTube 썸네일 클릭 재생 */
  .yt-cover { position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; cursor: pointer; background: #000; margin-bottom: .4rem; }
  .yt-cover img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity .2s; }
  .yt-cover:hover img { opacity: .85; }
  .yt-play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 62px; height: 62px; background: rgba(220,0,0,.88); border-radius: 50%; pointer-events: none; transition: transform .18s, background .18s; }
  .yt-cover:hover .yt-play-btn { transform: translate(-50%,-50%) scale(1.1); background: #f00; }
  .yt-play-btn::after { content: ''; position: absolute; top: 50%; left: 54%; transform: translate(-50%,-50%); border: 10px solid transparent; border-left: 18px solid #fff; }
  .yt-open-link { display: inline-block; margin-top: .5rem; font-size: .82rem; color: var(--P); text-decoration: none; opacity: .75; }
  .yt-open-link:hover { opacity: 1; text-decoration: underline; }

  /* Poem */
  .poem-author { font-size: .82rem; opacity: .6; margin-bottom: .6rem; }
  .poem-body { white-space: pre-line; font-family: 'Malgun Gothic','Apple SD Gothic Neo',serif; font-size: .95rem; line-height: 2.1; padding: .9rem 1rem; background: rgba(0,0,0,.04); border-radius: 10px; border-left: 4px solid var(--P); }

  /* Art */
  .art-img   { width: 100%; border-radius: 12px; margin-bottom: .7rem; display: block; }
  .art-title { font-weight: 700; font-size: .98rem; }
  .art-info  { font-size: .8rem; opacity: .6; margin-top: .1rem; }
  .art-desc  { font-size: .87rem; margin-top: .45rem; line-height: 1.6; }

  /* Places */
  .place-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: .7rem; }
  .place-item { background: rgba(0,0,0,.05); border-radius: 12px; padding: .8rem; }
  .place-icon { font-size: 1.5rem; margin-bottom: .25rem; }
  .place-name { font-weight: 700; font-size: .9rem; }
  .place-desc { font-size: .78rem; opacity: .65; margin-top: .2rem; }

  /* Books */
  .book-item { border-bottom: 1px solid rgba(0,0,0,.07); padding: .75rem 0; }
  .book-item:last-child { border-bottom: none; }
  .book-title  { font-weight: 700; font-size: .95rem; }
  .book-author { font-size: .78rem; opacity: .6; }
  .book-reason { font-size: .85rem; margin-top: .2rem; }

  /* Activities */
  .job-sel { width: 100%; padding: .5rem; border: 1.5px solid var(--P); border-radius: 8px; background: var(--card); color: var(--T); font-size: .9rem; margin-bottom: .8rem; cursor: pointer; }
  .act-list { list-style: none; }
  .act-list li { padding: .55rem .5rem; border-bottom: 1px solid rgba(0,0,0,.06); font-size: .9rem; display: flex; gap: .5rem; align-items: flex-start; }
  .act-list li::before { content: '🌟'; flex-shrink: 0; }
  .act-list li:last-child { border-bottom: none; }

  footer { text-align: center; padding: 2rem 1rem; font-size: .78rem; opacity: .45; }
</style>
</head>

  <div id="panel-music"  class="panel active  content-card"></div>

  <div id="panel-books"  class="panel         content-card"></div>
  <div id="panel-act"    class="panel         content-card"></div>

<footer>행복한 하루 · 날씨 제공: Open-Meteo · 명화: Wikimedia Commons</footer>

// ══════════════════════════════════════════
//  날짜별 pick — 해당 날짜의 연중 몇 번째 날인지 기준
// ══════════════════════════════════════════
function pickForDate(arr, dateStr) {
  const d   = new Date(dateStr + 'T00:00:00');
  const day = Math.floor((d - new Date(d.getFullYear(), 0, 1)) / 86400000);
  return arr[day % arr.length];
}

// ══════════════════════════════════════════
//  STATE & HELPERS
// ══════════════════════════════════════════
const $ = id => document.getElementById(id);
const WEEKDAYS = ['일','월','화','수','목','금','토'];
let forecast = null;
let curCond  = 'clear';

function getCondition(c) {
  if(c<=1) return 'clear'; if(c===2) return 'partlyCloudy'; if(c===3) return 'cloudy';
  if(c===45||c===48) return 'foggy'; if(c>=51&&c<=57) return 'drizzle';
  if([61,63,65,80,81,82].includes(c)) return 'rainy';
  if([71,73,75,85,86,77].includes(c)) return 'snowy';
  if(c>=95) return 'thunderstorm';
  return 'partlyCloudy';
}

function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

function initHeader() {
  const n = new Date();
  const days = ['일','월','화','수','목','금','토'];
  $('today-date').textContent = `${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 ${days[n.getDay()]}요일`;
}

// ══════════════════════════════════════════
//  FETCH
// ══════════════════════════════════════════
async function fetchForecast(lat, lon) {
  const r = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max` +
    `&timezone=auto&forecast_days=16`
  );
  return (await r.json()).daily;
}

async function reverseGeo(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=ko`);
    const j = await r.json();
    return j.address?.city || j.address?.county || j.address?.state || '현재 위치';
  } catch { return '현재 위치'; }
}

// ══════════════════════════════════════════
//  ENTRY POINTS
// ══════════════════════════════════════════
function getGeo() {
  if(!navigator.geolocation) { showErr('위치 서비스를 지원하지 않는 브라우저입니다.'); return; }
  showLoading();
  navigator.geolocation.getCurrentPosition(
    async p => {
      const city = await reverseGeo(p.coords.latitude, p.coords.longitude);
      await load(p.coords.latitude, p.coords.longitude, city);
    },
    () => load(37.5665, 126.9780, '서울')
  );
}

async function searchCity() {
  const city = $('city-input').value.trim();
  if(!city) return;
  showLoading();
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ko&format=json`);
    const j = await r.json();
    if(!j.results?.length) throw new Error('도시를 찾을 수 없습니다.');
    const { latitude, longitude, name } = j.results[0];
    await load(latitude, longitude, name);
  } catch(e) { showErr(e.message); }
}

async function load(lat, lon, city) {
  try {
    showLoading();
    forecast = await fetchForecast(lat, lon);
    renderCalendar(city);
    selectDay(0);
  } catch(e) { showErr('날씨를 불러오지 못했습니다: ' + e.message); }
}

// ══════════════════════════════════════════
//  RENDER CALENDAR
// ══════════════════════════════════════════
function renderCalendar(city) {
  $('loading').style.display = 'none';
  $('err-box').style.display = 'none';
  $('forecast-section').style.display = 'block';

  const today = todayStr();
  $('forecast-grid').innerHTML = forecast.time.map((dateStr, idx) => {
    const d    = new Date(dateStr + 'T00:00:00');
    const cond = getCondition(forecast.weather_code[idx]);
    const emoji = DB[cond].emoji;
    const tmax  = Math.round(forecast.temperature_2m_max[idx]);
    const tmin  = Math.round(forecast.temperature_2m_min[idx]);
    const rain  = Math.round(forecast.precipitation_sum[idx] * 10) / 10;
    const isToday = dateStr === today;

    return `<div class="day-card${isToday ? ' today-card' : ''}"
              onclick="selectDay(${idx})" id="day-card-${idx}">
      <div class="day-wd">${isToday ? '오늘' : WEEKDAYS[d.getDay()]}</div>
      <div class="day-dt">${d.getMonth()+1}/${d.getDate()}</div>
      <span class="day-ico">${emoji}</span>
      <div class="day-tmax">${tmax}°</div>
      <div class="day-tmin">${tmin}°</div>
      ${rain > 0.5 ? `<div class="day-rain">💧${rain}mm</div>` : ''}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  SELECT DAY
// ══════════════════════════════════════════
function selectDay(idx) {
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('sel'));
  const card = $('day-card-' + idx);
  if(card) {
    card.classList.add('sel');
    // 선택 카드가 화면 안에 오도록 스크롤
    card.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
  }

  const dateStr = forecast.time[idx];
  curCond = getCondition(forecast.weather_code[idx]);
  const d = DB[curCond];

  // 테마 변경
  document.body.className = d.cls;

  // 선택일 배너
  const date    = new Date(dateStr + 'T00:00:00');
  const today   = todayStr();
  const isToday = dateStr === today;
  const label   = isToday
    ? `오늘 — ${date.getMonth()+1}월 ${date.getDate()}일`
    : `${WEEKDAYS[date.getDay()]}요일, ${date.getMonth()+1}월 ${date.getDate()}일`;

  $('sel-emoji').textContent = d.emoji;
  $('sel-date').textContent  = '📅 ' + label;
  $('sel-temp').textContent  = `최고 ${Math.round(forecast.temperature_2m_max[idx])}° / 최저 ${Math.round(forecast.temperature_2m_min[idx])}°`;
  $('sel-cond').textContent  = d.name;
  const rain = Math.round(forecast.precipitation_sum[idx] * 10) / 10;
  $('sel-rain').textContent  = `💧 ${rain > 0 ? rain + 'mm' : '강수 없음'}`;
  $('sel-wind').textContent  = `💨 ${Math.round(forecast.wind_speed_10m_max[idx])}km/h`;
  $('sel-banner').style.display = 'flex';

  // 콘텐츠 렌더
  renderContent(curCond, dateStr);

  $('quote-box').style.display   = 'block';
  $('quote-box').style.background = 'var(--P)';
  $('tab-bar').style.display = 'flex';
  showTab('music');
}

  const poem  = pickForDate(d.poems,  dateStr);
  const art   = pickForDate(d.arts,   dateStr);

  $('q-text').textContent = quote.t;
  $('q-src').textContent  = quote.s;

  $('panel-music').innerHTML = `
    <div class="music-artist">${music.artist}</div>
    <div class="music-title">${music.title}</div>
    <div class="music-why">${music.why}</div>
    <div class="yt-cover" onclick="loadYT(this,'${music.yt}')">
      <img src="https://img.youtube.com/vi/${music.yt}/hqdefault.jpg"
           onerror="this.src='https://img.youtube.com/vi/${music.yt}/mqdefault.jpg'"
           alt="${music.title}">
      <div class="yt-play-btn"></div>
    </div>
    <a class="yt-open-link" href="https://www.youtube.com/watch?v=${music.yt}" target="_blank" rel="noopener">↗ YouTube에서 바로 열기</a>`;

  $('panel-poem').innerHTML = `<div class="poem-author">${poem.title} — ${poem.author}</div><div class="poem-body">${poem.text}</div>`;

  $('panel-art').innerHTML = `<img class="art-img" id="art-img-el" data-src="${art.img}" src="" alt="${art.title}" style="min-height:60px;background:rgba(0,0,0,.05)"><div class="art-title">${art.title}</div><div class="art-info">${art.info}</div><div class="art-desc">${art.desc}</div>`;

  $('panel-places').innerHTML = `<div class="place-grid">${d.places.map(p=>`<div class="place-item"><div class="place-icon">${p.i}</div><div class="place-name">${p.n}</div><div class="place-desc">${p.d}</div></div>`).join('')}</div>`;

  $('panel-books').innerHTML = d.books.map(b=>`<div class="book-item"><div class="book-title">📖 ${b.t}</div><div class="book-author">${b.a}</div><div class="book-reason">${b.r}</div></div>`).join('');

  $('panel-act').innerHTML = `
    <select class="job-sel" id="job-sel" onchange="renderAct()">
      <option value="student">🎓 학생</option>
      <option value="office">💻 직장인</option>
      <option value="home">🏠 주부·부모</option>
      <option value="retired">🌿 은퇴자·시니어</option>
      <option value="freelance">🖥️ 프리랜서·재택근무</option>
      <option value="artist">🎨 크리에이터·예술가</option>
    </select>
    <ul id="act-list" class="act-list"></ul>`;
  renderAct();
}

function renderAct() {
  const job  = ($('job-sel') || {}).value || 'student';
  const acts = DB[curCond]?.jobs[job] || [];
  $('act-list').innerHTML = acts.map(a => `<li>${a}</li>`).join('');
}

function loadYT(el, id){
  el.style.cursor='default';
  el.innerHTML=`<iframe style="position:absolute;inset:0;width:100%;height:100%;border:none;" src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`;
}

function showTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    const tabs = ['music','poem','art','places','books','act'];
    b.classList.toggle('active', tabs[i] === name);
  });
  ['music','poem','art','places','books','act'].forEach(t => {
    $('panel-' + t).classList.toggle('active', t === name);
  });
  if(name==='art'){const img=document.getElementById('art-img-el');if(img&&img.dataset.src)img.src=img.dataset.src;}
}

function showLoading() {
  $('loading').style.display = 'block';
  $('err-box').style.display = 'none';
  $('forecast-section').style.display = 'none';
  $('sel-banner').style.display = 'none';
  $('quote-box').style.display  = 'none';
  $('tab-bar').style.display    = 'none';
  ['music','poem','art','places','books','act'].forEach(t => {
    $('panel-' + t).classList.remove('active');
  });
}

function showErr(msg) {
  $('loading').style.display = 'none';
  $('err-box').style.display = 'block';
  $('err-box').innerHTML = `<p>⚠️ ${msg}</p><button class="err-btn" onclick="load(37.5665,126.9780,'서울')">서울 날씨로 보기</button>`;
}

// ── Init ─────────────────────────────────
initHeader();
window.addEventListener('load', getGeo);
</script>
</body>
</html>
